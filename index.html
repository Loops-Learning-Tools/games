<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Loops Library — Learning Games</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    
    :root {
      --ink: #152a63;
      --paper: #f2f4fa;
      --card: #ffffff;
      --line: #d7deee;
      --coral: #2f5aa8;
      --gold: #b8862f;
      --teal: #0d7a68;
      --muted: #4a5578;
    }
    
    body {
      font-family: 'Nunito', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: var(--paper);
      color: var(--ink);
      line-height: 1.6;
    }
    
    /* Header */
    .header {
      background: var(--card);
      border-bottom: 3px solid var(--line);
      padding: 30px 20px;
      text-align: center;
    }
    
    .logo-section {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 20px;
      margin-bottom: 20px;
    }
    
    .logo-img {
      height: 80px;
      width: auto;
    }
    
    .header h1 {
      font-family: 'Playfair Display', serif;
      font-size: 2.5rem;
      color: var(--ink);
      font-weight: 700;
      letter-spacing: -1px;
    }
    
    .header p {
      color: var(--muted);
      font-size: 1.1rem;
      margin-top: 8px;
    }
    
    /* Controls */
    .controls {
      background: var(--card);
      padding: 25px 20px;
      display: flex;
      flex-wrap: wrap;
      gap: 15px;
      align-items: center;
      justify-content: center;
      border-bottom: 2px solid var(--line);
    }
    
    .search-box {
      flex: 1;
      min-width: 250px;
      max-width: 400px;
    }
    
    .search-box input {
      width: 100%;
      padding: 12px 16px;
      border: 2px solid var(--line);
      border-radius: 8px;
      font-size: 1rem;
      font-family: inherit;
      transition: all 0.2s;
    }
    
    .search-box input:focus {
      outline: none;
      border-color: var(--coral);
      box-shadow: 0 0 0 3px rgba(47, 90, 168, 0.1);
    }
    
    .filter-group {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
      justify-content: center;
    }
    
    .filter-btn {
      padding: 10px 16px;
      border: 2px solid var(--line);
      background: var(--card);
      color: var(--ink);
      border-radius: 24px;
      cursor: pointer;
      font-size: 0.95rem;
      font-weight: 600;
      transition: all 0.2s;
    }
    
    .filter-btn:hover {
      border-color: var(--coral);
      color: var(--coral);
    }
    
    .filter-btn.active {
      background: var(--coral);
      color: white;
      border-color: var(--coral);
    }
    
    /* Main */
    .container {
      max-width: 1200px;
      margin: 0 auto;
      padding: 40px 20px;
    }
    
    .category-section {
      margin-bottom: 50px;
    }
    
    .category-header {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-bottom: 25px;
      padding-bottom: 12px;
      border-bottom: 3px solid var(--line);
    }
    
    .category-emoji {
      font-size: 2rem;
    }
    
    .category-name {
      font-family: 'Playfair Display', serif;
      font-size: 1.8rem;
      color: var(--ink);
      font-weight: 700;
    }
    
    .game-count {
      margin-left: auto;
      color: var(--muted);
      font-size: 0.95rem;
      font-weight: 600;
    }
    
    .games-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
      gap: 20px;
    }
    
    .game-tile {
      background: var(--card);
      border: 2px solid var(--line);
      border-radius: 12px;
      padding: 24px;
      cursor: pointer;
      transition: all 0.3s;
      display: flex;
      flex-direction: column;
      text-decoration: none;
      color: inherit;
    }
    
    .game-tile:hover {
      border-color: var(--coral);
      box-shadow: 0 8px 24px rgba(47, 90, 168, 0.15);
      transform: translateY(-4px);
    }
    
    .game-tile-header {
      display: flex;
      align-items: flex-start;
      gap: 12px;
      margin-bottom: 12px;
    }
    
    .game-emoji {
      font-size: 1.8rem;
      flex-shrink: 0;
    }
    
    .game-name {
      font-family: 'Playfair Display', serif;
      font-size: 1.3rem;
      font-weight: 700;
      color: var(--ink);
      line-height: 1.2;
    }
    
    .game-meta {
      display: flex;
      gap: 16px;
      color: var(--muted);
      font-size: 0.9rem;
      margin-bottom: 16px;
      padding-top: 12px;
      border-top: 1px solid var(--line);
    }
    
    .meta-item {
      display: flex;
      align-items: center;
      gap: 4px;
    }
    
    .game-category {
      display: inline-block;
      background: var(--paper);
      color: var(--coral);
      padding: 4px 12px;
      border-radius: 16px;
      font-size: 0.85rem;
      font-weight: 600;
      margin-top: auto;
    }
    
    .play-btn {
      background: var(--coral);
      color: white;
      padding: 12px 20px;
      border: none;
      border-radius: 8px;
      font-weight: 600;
      cursor: pointer;
      margin-top: 16px;
      transition: all 0.2s;
      font-size: 1rem;
    }
    
    .play-btn:hover {
      background: #1e4a8a;
      transform: scale(1.02);
    }
    
    /* Empty state */
    .empty-state {
      text-align: center;
      padding: 60px 20px;
      color: var(--muted);
    }
    
    .empty-state-icon {
      font-size: 4rem;
      margin-bottom: 20px;
      opacity: 0.5;
    }
    
    .empty-state h2 {
      font-size: 1.5rem;
      margin-bottom: 10px;
      color: var(--ink);
    }
    
    /* Footer */
    .footer {
      background: var(--card);
      border-top: 2px solid var(--line);
      padding: 30px 20px;
      text-align: center;
      color: var(--muted);
      font-size: 0.9rem;
      margin-top: 60px;
    }
    
    .footer em {
      font-style: italic;
      color: var(--ink);
    }
    
    .category-section.empty {
      display: none;
    }
    
    .hidden {
      display: none !important;
    }
    
    @media (max-width: 768px) {
      .header h1 {
        font-size: 1.8rem;
      }
      
      .logo-section {
        flex-direction: column;
        gap: 15px;
      }
      
      .controls {
        flex-direction: column;
      }
      
      .search-box {
        max-width: 100%;
      }
      
      .filter-group {
        width: 100%;
      }
      
      .games-grid {
        grid-template-columns: 1fr;
      }
    }
  </style>
</head>
<body>
  <!-- Header -->
  <div class="header">
    <div class="logo-section">
      <img src="Loops_exact_triskel_mirror.png" alt="Loops" class="logo-img">
      <div>
        <h1>Loops</h1>
        <p><em>Learning Tools. Dublin.</em></p>
      </div>
    </div>
  </div>

  <!-- Controls -->
  <div class="controls">
    <div class="search-box">
      <input type="text" id="searchInput" placeholder="Search games..." onkeyup="filterGames()">
    </div>
    <div class="filter-group">
      <button class="filter-btn active" onclick="filterByCategory('')">All</button>
      <button class="filter-btn" onclick="filterByCategory('Language')">🌍 Language</button>
      <button class="filter-btn" onclick="filterByCategory('Onboarding')">🪪 Onboarding</button>
      <button class="filter-btn" onclick="filterByCategory('Compliance')">🛡️ Compliance</button>
      <button class="filter-btn" onclick="filterByCategory('Exam Prep')">📝 Exam Prep</button>
    </div>
  </div>

  <!-- Main -->
  <div class="container" id="library"></div>

  <!-- Footer -->
  <div class="footer">
    <p>© 2026 Loops Learning Tools · <em>Imagination and Perseverance</em></p>
  </div>

  <script>
    let allGames = [];
    let currentFilter = '';

    async function loadLibrary() {
      try {
        const response = await fetch('./games.json');
        const data = await response.json();
        allGames = data.games || [];
        renderLibrary();
      } catch (err) {
        console.error('Error loading library:', err);
        document.getElementById('library').innerHTML = `
          <div class="empty-state">
            <div class="empty-state-icon">📚</div>
            <h2>No games yet</h2>
            <p>Games will appear here as they're published.</p>
          </div>
        `;
      }
    }

    function renderLibrary() {
      const categories = {
        'Language': { emoji: '🌍', games: [] },
        'Onboarding': { emoji: '🪪', games: [] },
        'Compliance': { emoji: '🛡️', games: [] },
        'Exam Prep': { emoji: '📝', games: [] }
      };

      allGames.forEach(game => {
        const cat = game.category || 'Language';
        if (categories[cat]) {
          categories[cat].games.push(game);
        }
      });

      let html = '';
      let hasGames = false;

      for (const [catName, catData] of Object.entries(categories)) {
        if (catData.games.length === 0) continue;
        hasGames = true;

        html += `
          <div class="category-section" data-category="${catName}">
            <div class="category-header">
              <span class="category-emoji">${catData.emoji}</span>
              <h2 class="category-name">${catName}</h2>
              <span class="game-count">${catData.games.length} game${catData.games.length !== 1 ? 's' : ''}</span>
            </div>
            <div class="games-grid">
        `;

        catData.games.forEach(game => {
          html += `
            <a href="games/${game.slug}.html" class="game-tile" data-search="${game.name.toLowerCase()}">
              <div class="game-tile-header">
                <span class="game-emoji">🎮</span>
                <h3 class="game-name">${game.name}</h3>
              </div>
              <div class="game-meta">
                <div class="meta-item">📊 ${game.loopCount} loop${game.loopCount !== 1 ? 's' : ''}</div>
                <div class="meta-item">❓ ${game.questionCount} q's</div>
              </div>
              <button class="play-btn">Play →</button>
            </a>
          `;
        });

        html += `
            </div>
          </div>
        `;
      }

      if (!hasGames) {
        html = `
          <div class="empty-state">
            <div class="empty-state-icon">📚</div>
            <h2>No games yet</h2>
            <p>Games will appear here as they're published.</p>
          </div>
        `;
      }

      document.getElementById('library').innerHTML = html;
    }

    function filterByCategory(cat) {
      currentFilter = cat;
      document.querySelectorAll('.filter-btn').forEach(btn => btn.classList.remove('active'));
      event.target.classList.add('active');
      filterGames();
    }

    function filterGames() {
      const search = document.getElementById('searchInput').value.toLowerCase();
      const tiles = document.querySelectorAll('.game-tile');
      
      tiles.forEach(tile => {
        const matchesSearch = !search || tile.dataset.search.includes(search);
        tile.style.display = matchesSearch ? 'flex' : 'none';
      });
    }

    // Load on page load
    loadLibrary();
  </script>
</body>
</html>
